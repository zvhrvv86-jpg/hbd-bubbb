<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Dela Silvira ❤</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            background-color: #050508;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .space-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #111118 0%, #040406 100%);
            z-index: 1;
        }

        /* TOMBOL MULAI ANTI-BLOKIR BROWSER */
        .gatekeeper {
            position: absolute;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: all 0.5s ease;
        }
        .start-btn {
            background: linear-gradient(45deg, #ff7597, #ffb3c6);
            color: #050508;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 117, 151, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(255, 117, 151, 0.7);
        }
        .gatekeeper p {
            font-size: 0.8rem;
            color: #666680;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* INTRO LAYER (Countdown) */
        .intro-layer {
            position: absolute;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #countdown-text {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, #ff7597);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 117, 151, 0.5);
            transition: all 0.4s ease;
            text-align: center;
            padding: 0 20px;
            opacity: 0;
        }

        /* MAIN SHOWCASE STAGE */
        .stage {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .love-orbit {
            position: absolute;
            width: 0; height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }
        .orbit-rotating {
            animation: gentleRotate 25s linear infinite;
        }
        @keyframes gentleRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .polaroid-card {
            position: absolute;
            width: 110px;
            background: #ffffff;
            padding: 6px 6px 18px 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            border-radius: 2px;
            opacity: 0;
            transform: scale(0) translate(-50%, -50%);
            transition: opacity 0.8s ease, transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: 0 0;
        }
        .polaroid-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }

        /* TEXT BOX DI TENGAH LOVE */
        .center-message {
            position: absolute;
            width: 260px;
            background: rgba(5, 5, 8, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 5;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #e2e2e9;
            transform: scale(0);
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .center-message.pop {
            transform: scale(1);
        }
        .cursor {
            display: inline-block;
            width: 5px; height: 1rem;
            background: #ff7597;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 480px) {
            .polaroid-card { width: 75px; padding: 4px 4px 12px 4px; }
            .center-message { width: 180px; font-size: 0.72rem; padding: 12px; }
            #countdown-text { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="space-bg"></div>

    <!-- Tombol Khusus untuk unlock Audio Browser -->
    <div class="gatekeeper" id="auth-gate">
        <button class="start-btn" onclick="unlockAndStart()">Open Special Gift ✨</button>
        <p>Turn on your sound</p>
    </div>

    <!-- Intro Layer -->
    <div class="intro-layer">
        <div id="countdown-text"></div>
    </div>

    <!-- Main Stage -->
    <div class="stage" id="main-stage">
        <div class="love-orbit" id="orbit-node"></div>
        <div class="center-message" id="message-node">
            <span id="typing-text"></span><span class="cursor"></span>
        </div>
    </div>

    <!-- Audio Tautan Lagu: Last Night on Earth -->
    <audio id="bgMusic" src="https://archive.org/download/greenday_202002/Green%20Day%20-%20Last%20Night%20On%20Earth.mp3" loop preload="auto"></audio>

    <script>
        const ucapan = "hbd Dela Silvira... im so grateful to have you around. makasih bgt udah jadi comfort character yang selalu hadir pas dunia lagi ga asik dan pas aku lagi jatuh-jatuhnya. i mean, gimana bisa ada orang secantik, selucu, dan setinggi kamu tapi random-nya se-seru ini? wkwk. moga di usia baru ini semesta selalu baik sama kamu, sehat terus, dan semua plan kamu di-approve langit. stay as you are, del. lowkey praying we last forever... happy level up day, my favorite human! 🤍";
        
        const music = document.getElementById("bgMusic");

        // FUNGSI UTAMA UNTUK UNLOCK AUDIO & MULAI ANIMASI
        function unlockAndStart() {
            // Sembunyikan tombol pembuka
            document.getElementById("auth-gate").style.opacity = "0";
            document.getElementById("auth-gate").style.pointerEvents = "none";

            // Paksa musik berjalan lewat trigger klik user langsung
            music.play().then(() => {
                console.log("Audio successfully loaded and playing.");
            }).catch(err => {
                console.log("Audio failed to play automatically:", err);
            });

            // Jalankan hitung mundur setelah tombol hilang
            setTimeout(runCountdown, 400);
        }

        function runCountdown() {
            const cd = document.getElementById("countdown-text");
            const steps = ["3", "2", "1", "HBD FOR DELA SILVIRA ✨"];
            let currentIdx = 0;

            function showStep() {
                if (currentIdx < steps.length) {
                    cd.innerHTML = steps[currentIdx];
                    cd.style.transform = "scale(1.3)";
                    cd.style.opacity = "1";
                    
                    setTimeout(() => {
                        if (currentIdx < steps.length - 1) {
                            cd.style.transform = "scale(0.7)";
                            cd.style.opacity = "0";
                        }
                    }, 700);

                    let delay = currentIdx === steps.length - 1 ? 2200 : 1000;
                    currentIdx++;
                    setTimeout(showStep, delay);
                } else {
                    cd.style.opacity = "0";
                    setTimeout(initLoveGallery, 300);
                }
            }
            showStep();
        }

        function initLoveGallery() {
            document.getElementById("main-stage").style.opacity = "1";
            const orbit = document.getElementById("orbit-node");
            const totalPhotos = 15;
            const spreadFactor = window.innerWidth < 480 ? 11 : 18;

            for (let j = 1; j <= totalPhotos; j++) {
                const card = document.createElement("div");
                card.className = "polaroid-card";
                card.innerHTML = `<img src="b${j}.png" alt="Dela ${j}">`;
                orbit.appendChild(card);

                const t = (j / totalPhotos) * 2 * Math.PI - Math.PI/2; 
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                const posX = x * spreadFactor;
                const posY = y * spreadFactor;

                setTimeout(() => {
                    card.style.opacity = "1";
                    const cardRotate = Math.random() * 16 - 8;
                    card.style.transform = `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) rotate(${cardRotate}deg) scale(1)`;
                }, j * 200);
            }

            setTimeout(() => {
                document.getElementById("message-node").classList.add("pop");
                orbit.classList.add("orbit-rotating");
                startTyping();
            }, (totalPhotos * 200) + 1000);
        }

        let charIdx = 0;
        function startTyping() {
            const box = document.getElementById("typing-text");
            if (charIdx < ucapan.length) {
                box.innerHTML += ucapan.charAt(charIdx);
                charIdx++;
                setTimeout(startTyping, 45);
            }
        }
    </script>
</body>
</html>
