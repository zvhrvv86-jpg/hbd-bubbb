<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Dela Silvira ❤</title>
    <!-- Menyambungkan ke file style.css -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="space-bg"></div>

    <!-- Tombol Pembuka (Unlock Audio & Start) -->
    <div class="gatekeeper" id="auth-gate">
        <button class="start-btn" id="btn-start">Open Special Gift ✨</button>
        <p>Turn on your sound</p>
    </div>

    <!-- Layer Hitung Mundur (Countdown) -->
    <div class="intro-layer">
        <div id="countdown-text"></div>
    </div>

    <!-- Panggung Utama (Formasi Love & Surat) -->
    <div class="stage" id="main-stage">
        <div class="love-orbit" id="orbit-node"></div>
        <div class="center-message" id="message-node">
            <span id="typing-text"></span><span class="cursor"></span>
        </div>
    </div>

    <!-- Pemutar Musik -->
    <audio id="bgMusic" src="https://archive.org/download/greenday_202002/Green%20Day%20-%20Last%20Night%20On%20Earth.mp3" loop preload="auto"></audio>

    <!-- Menyambungkan ke file script.js -->
    <script src="script.js"></script>
</body>
</html>
