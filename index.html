<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Dela Silvira!</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: url('aurora.jpg') no-repeat center center fixed;
            background-size: cover;
            animation: rotateBackground 20s linear infinite;
            font-family: 'Poppins', sans-serif;
            color: #fff;
        }
        @keyframes rotateBackground {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .countdown {
            font-size: 6rem;
            animation: fadeIn 1s ease forwards;
        }
        .text {
            font-size: 3rem;
            margin-top: 30px;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
            animation-delay: 3s;
            text-align: center;
        }
        .text span {
            display: block;
            opacity: 0;
            animation: fadeText 1s ease forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes fadeText {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(20px); }
        }
    </style>
</head>
<body>
    <div class="countdown" id="countdown">3</div>
    <div class="text">
        <span style="animation-delay: 3.5s;">Happy</span>
        <span style="animation-delay: 4s;">Birthday</span>
        <span style="animation-delay: 4.5s;">To</span>
        <span style="animation-delay: 5s;">Dela Silvira</span>
    </div>

    <script>
        let countdown = document.getElementById('countdown');
        let count = 3;

        let interval = setInterval(() => {
            count--;
            if (count === 0) {
                countdown.style.display = 'none';
                clearInterval(interval);
            } else {
                countdown.innerText = count;
            }
        }, 1000);
    </script>
</body>
</html>
