<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Dela Silvira ✨</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent: #f472b6;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* ANIMASI AURORA BACKGROUND */
        .aurora {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(125deg, #1e1b4b, #312e81, #be185d, #0f172a);
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
        }
        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { max-width: 700px; width: 90%; text-align: center; padding-top: 50px; }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .letter-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 25px;
            margin: 40px 0;
            text-align: left;
            line-height: 1.8;
            font-size: 1.1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .cursor { display: inline-block; width: 4px; height: 1.2rem; background: var(--accent); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* MASONRY GRID FOTO */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 100px;
        }

        .photo-card {
            background: #fff;
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(30px);
        }
        .photo-card.visible { opacity: 1; transform: translateY(0); }
        .photo-card:hover { transform: scale(1.05) rotate(0deg) !important; }
        .photo-card img { width: 100%; border-radius: 5px; aspect-ratio: 1; object-fit: cover; }

        .btn-music {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--accent); color: white; border: none;
            width: 60px; height: 60px; border-radius: 50%;
            cursor: pointer; font-size: 1.5rem; z-index: 99;
            box-shadow: 0 4px 15px rgba(244, 114, 182, 0.4);
        }
    </style>
</head>
<body>

    <div class="aurora"></div>

    <div class="container">
        <h1>Happy Birthday, Dela! ✨</h1>
        <p style="color: #94a3b8; letter-spacing: 5px; text-transform: uppercase;">to my favorite person</p>

        <div class="letter-card">
            <span id="text"></span><span class="cursor"></span>
        </div>

        <div class="gallery" id="gallery">
            <!-- Loop foto b1 - b15 -->
        </div>
    </div>

    <button class="btn-music" onclick="playMusic()">🎵</button>
    <audio id="audio" src="https://archive.org/download/greenday_202002/Green%20Day%20-%20Last%20Night%20On%20Earth.mp3" loop></audio>

    <script>
        // 1. ANIMASI TULISAN
        const msg = "hbd Dela Silvira... jujurly, this day is meant to celebrate how amazing you are. makasih udah jadi orang yang selalu nemenin aku, dengerin random talk aku, dan jadi comfort space buat aku. i hope this year brings you nothing but joy, less stress, and more wins! stay cute, stay yourself, and please keep shining. luv u! 🤍";
        let i = 0;
        function typeWriter() {
            if (i < msg.length) {
                document.getElementById("text").innerHTML += msg.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        typeWriter();

        // 2. GENERATE FOTO OTOMATIS
        const gallery = document.getElementById('gallery');
        for (let j = 1; j <= 15; j++) {
            const div = document.createElement('div');
            div.className = 'photo-card';
            div.style.transitionDelay = `${j * 0.1}s`;
            div.style.transform = `rotate(${Math.random() * 10 - 5}deg)`;
            div.innerHTML = `<img src="b${j}.png" onerror="this.style.display='none'">`;
            gallery.appendChild(div);
        }

        // 3. ANIMASI SCROLL REVEAL
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.photo-card').forEach(p => {
                if(p.getBoundingClientRect().top < window.innerHeight - 100) p.classList.add('visible');
            });
        });
        // Trigger reveal buat yang di atas
        setTimeout(() => document.querySelectorAll('.photo-card').forEach(p => p.classList.add('visible')), 500);

        // 4. MUSIK
        function playMusic() {
            const audio = document.getElementById("audio");
            if(audio.paused) { audio.play(); } else { audio.pause(); }
        }
    </script>
</body>
</html>
