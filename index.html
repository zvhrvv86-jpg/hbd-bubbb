<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Dela Silvira ❤</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            background-color: #050508;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* Efek 3D Kedalaman */
        }

        /* Latar Belakang Gelap Ambient */
        .space-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #111118 0%, #040406 100%);
            z-index: 1;
        }

        /* INTRO LAYER (Countdown) */
        .intro-layer {
            position: absolute;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        #countdown-text {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, #ff7597);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 117, 151, 0.5);
            transition: all 0.4s ease;
            text-align: center;
            padding: 0 20px;
        }

        /* MAIN SHOWCASE STAGE */
        .stage {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* CONTAINER UNTUK REVOLUSI BENTUK LOVE */
        .love-orbit {
            position: absolute;
            width: 0; height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }
        .orbit-rotating {
            animation: gentleRotate 20s linear infinite;
        }
        @keyframes gentleRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Polaroid Card Item */
        .polaroid-card {
            position: absolute;
            width: 110px;
            background: #ffffff;
            padding: 6px 6px 18px 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            border-radius: 2px;
            opacity: 0;
            transform: scale(0) translate(-50%, -50%);
            transition: opacity 0.8s ease, transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: 0 0;
        }
        .polaroid-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }

        /* TEXT BOX DI TENGAH-TENGAH LOVE */
        .center-message {
            position: absolute;
            width: 260px;
            background: rgba(5, 5, 8, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 5;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #e2e2e9;
            transform: scale(0);
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .center-message.pop {
            transform: scale(1);
        }
        .cursor {
            display: inline-block;
            width: 5px; height: 1rem;
            background: #ff7597;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Petunjuk Awal */
        .start-hint {
            position: absolute;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #666680;
            text-transform: uppercase;
            animation: pulse 1.5s infinite alternate;
            cursor: pointer;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 0.9; } }

        @media (max-width: 480px) {
            .polaroid-card { width: 75px; padding: 4px 4px 12px 4px; }
            .center-message { width: 180px; font-size: 0.72rem; padding: 12px; }
            #countdown-text { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="space-bg"></div>
    <div class="start-hint" id="hint" onclick="startMasterpiece()">Tap anywhere to start the magic...</div>

    <!-- Intro Layer -->
    <div class="intro-layer">
        <div id="countdown-text"></div>
    </div>

    <!-- Main Stage -->
    <div class="stage" id="main-stage">
        <!-- Orbit Tempat Foto Berbaris Membentuk Love & Berputar -->
        <div class="love-orbit" id="orbit-node"></div>
        
        <!-- Pesan Surat di Tengah Love -->
        <div class="center-message" id="message-node">
            <span id="typing-text"></span><span class="cursor"></span>
        </div>
    </div>

    <audio id="bgMusic" src="https://archive.org/download/greenday_202002/Green%20Day%20-%20Last%20Night%20On%20Earth.mp3" loop></audio>

    <script>
        const ucapan = "hbd Dela Silvira... im so grateful to have you around. makasih bgt udah jadi comfort character yang selalu hadir pas dunia lagi ga asik dan pas aku lagi jatuh-jatuhnya. i mean, gimana bisa ada orang secantik, selucu, dan setinggi kamu tapi random-nya se-seru ini? wkwk. moga di usia baru ini semesta selalu baik sama kamu, sehat terus, dan semua plan kamu di-approve langit. stay as you are, del. lowkey praying we last forever... happy level up day, my favorite human! 🤍";
        
        const music = document.getElementById("bgMusic");
        let hasStarted = false;

        function startMasterpiece() {
            if (hasStarted) return;
            hasStarted = true;

            document.getElementById("hint").style.display = "none";
            
            // Jalankan Musik Instan
            music.play().catch(() => console.log("Audio diizinkan"));

            // Mulai Sekuens Animasi S3
            runCountdown();
        }

        // 1. ANIMASI COUNTDOWN DAN TEXT RUNNING INTRO
        function runCountdown() {
            const cd = document.getElementById("countdown-text");
            const steps = ["3", "2", "1", "HBD FOR DELA SILVIRA ✨"];
            let currentIdx = 0;

            function showStep() {
                if (currentIdx < steps.length) {
                    cd.innerHTML = steps[currentIdx];
                    cd.style.transform = "scale(1.3)";
                    cd.style.opacity = "1";
                    
                    setTimeout(() => {
                        if (currentIdx < steps.length - 1) {
                            cd.style.transform = "scale(0.7)";
                            cd.style.opacity = "0";
                        }
                    }, 700);

                    // Beri waktu lebih lama khusus untuk teks ucapan nama terakhir
                    let delay = currentIdx === steps.length - 1 ? 2200 : 1000;
                    currentIdx++;
                    setTimeout(showStep, delay);
                } else {
                    // Hilangkan layer intro, munculkan panggung utama
                    cd.style.opacity = "0";
                    setTimeout(initLoveGallery, 300);
                }
            }
            showStep();
        }

        // 2. MATEMATIKA STRUKTUR LOVE (FORMASI 15 FOTO)
        function initLoveGallery() {
            document.getElementById("main-stage").style.opacity = "1";
            const orbit = document.getElementById("orbit-node");
            const totalPhotos = 15;
            
            // Jarak rentang ukuran bentuk hati di layar (Disesuaikan responsif HP)
            const spreadFactor = window.innerWidth < 480 ? 11 : 18;

            for (let j = 1; j <= totalPhotos; j++) {
                const card = document.createElement("div");
                card.className = "polaroid-card";
                card.innerHTML = `<img src="b${j}.png" alt="Memory ${j}">`;
                orbit.appendChild(card);

                // Rumus Parametrik Matematika Bentuk Hati (Heart Curve)
                // t di-mapping dari 0 sampai 2 * PI berputar searah jarum jam
                const t = (j / totalPhotos) * 2 * Math.PI - Math.PI/2; 
                
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                const posX = x * spreadFactor;
                const posY = y * spreadFactor;

                // Memunculkan foto beruntun satu per satu memutar membentuk Love
                setTimeout(() => {
                    card.style.opacity = "1";
                    // Beri sedikit rotasi miring acak khas polaroid asli
                    const cardRotate = Math.random() * 16 - 8;
                    card.style.transform = `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) rotate(${cardRotate}deg) scale(1)`;
                }, j * 200); // Delay jeda antar foto keluar (efek mengalir)
            }

            // Setelah semua foto rapi membentuk love, munculkan surat & putar formasinya
            setTimeout(() => {
                document.getElementById("message-node").classList.add("pop");
                orbit.classList.add("orbit-rotating");
                startTyping();
            }, (totalPhotos * 200) + 1000);
        }

        // 3. ANIMASI MESIN KETIK SURAT DI TENGAH LOVE
        let charIdx = 0;
        function startTyping() {
            const box = document.getElementById("typing-text");
            if (charIdx < ucapan.length) {
                box.innerHTML += ucapan.charAt(charIdx);
                charIdx++;
                setTimeout(startTyping, 45);
            }
        }
    </script>
</body>
</html>
